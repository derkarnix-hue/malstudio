<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="3🍀 Vorlesen">
  <meta name="theme-color" content="#020617">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🍀</text></svg>">
  <title>3🍀 Vorlesen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: white;
    }
    .header {
      text-align: center;
      padding: 20px 0;
    }
    .header h1 { font-size: 28px; color: #10b981; }
    .header p { color: #94a3b8; margin-top: 5px; }
    .mic-button {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      color: white;
      font-size: 80px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
      margin: 30px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mic-button:hover { transform: scale(1.05); }
    .mic-button:active { transform: scale(0.95); }
    .mic-button.speaking {
      animation: pulse 1s infinite;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 30px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    .text-area {
      width: 100%;
      max-width: 500px;
      margin: 10px 0;
    }
    textarea {
      width: 100%;
      padding: 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      resize: vertical;
      min-height: 120px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #10b981; }
    .controls {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 500px;
      margin-top: 10px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-speak { background: #10b981; color: white; }
    .btn-speak:hover { background: #059669; }
    .btn-stop { background: #ef4444; color: white; }
    .btn-stop:hover { background: #dc2626; }
    .btn-clear { background: #334155; color: white; }
    .btn-clear:hover { background: #475569; }
    .status {
      text-align: center;
      color: #94a3b8;
      margin-top: 15px;
      font-size: 14px;
    }
    .voice-select {
      width: 100%;
      max-width: 500px;
      margin-top: 10px;
    }
    select {
      width: 100%;
      padding: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      color: white;
      font-size: 14px;
    }
    label { color: #94a3b8; font-size: 13px; display: block; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍀 3🍀 Vorlesen</h1>
    <p>Tippen oder einfügen, dann vorlesen lassen</p>
  </div>

  <button class="mic-button" id="micBtn" onclick="speakNow()">🗣️</button>

  <div class="text-area">
    <textarea id="textInput" placeholder="Hier Text eingeben oder einfügen..."></textarea>
  </div>

  <div class="voice-select">
    <label>Stimme auswählen:</label>
    <select id="voiceSelect"></select>
  </div>

  <div class="controls">
    <button class="btn btn-speak" onclick="speakNow()">🔊 Vorlesen</button>
    <button class="btn btn-stop" onclick="stopNow()">⏹ Stopp</button>
    <button class="btn btn-clear" onclick="clearText()">✕ Leeren</button>
  </div>

  <div class="status" id="status">Bereit</div>

  <script>
    const synth = window.speechSynthesis;
    const textInput = document.getElementById('textInput');
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('status');
    const voiceSelect = document.getElementById('voiceSelect');
    let voices = [];

    function loadVoices() {
      voices = synth.getVoices();
      voiceSelect.innerHTML = '';
      const germanVoices = voices.filter(v => v.lang.startsWith('de'));
      const allVoices = germanVoices.length > 0 ? germanVoices : voices;
      allVoices.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = v.name + ' (' + v.lang + ')';
        if (v.lang.startsWith('de')) opt.selected = true;
        voiceSelect.appendChild(opt);
      });
    }

    loadVoices();
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = loadVoices;
    }

    function getSelectedVoice() {
      const name = voiceSelect.value;
      return voices.find(v => v.name === name) || null;
    }

    function speakNow() {
      window.speechSynthesis.cancel();
      const text = textInput.value.trim();
      if (!text) { status.textContent = 'Bitte Text eingeben!'; return; }

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'de-DE';
      utterance.rate = 0.85;
      utterance.pitch = 0.6;
      const selectedVoice = getSelectedVoice();
      if (selectedVoice) utterance.voice = selectedVoice;

      utterance.onstart = () => {
        micBtn.classList.add('speaking');
        micBtn.textContent = '🔊';
        status.textContent = 'Sprich...';
      };
      utterance.onend = () => {
        micBtn.classList.remove('speaking');
        micBtn.textContent = '🗣️';
        status.textContent = 'Fertig ✓';
      };
      utterance.onerror = (e) => {
        micBtn.classList.remove('speaking');
        micBtn.textContent = '🗣️';
        status.textContent = 'Fehler: ' + e.error;
      };

      window.speechSynthesis.speak(utterance);
    }

    function stopNow() {
      window.speechSynthesis.cancel();
      micBtn.classList.remove('speaking');
      micBtn.textContent = '🗣️';
      status.textContent = 'Gestoppt';
    }

    function clearText() {
      textInput.value = '';
      status.textContent = 'Text gelöscht';
    }

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') speakNow();
    });
  </script>
</body>
</html>
